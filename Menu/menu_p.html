<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú principal</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JavaScript/script.js" defer></script>
</head>
<body class="body_menu">
    <header class="header_menu">
        <div class="logo_marca_testeo">
            <div class="icon_logo">S</div>
            <div class="texto_marca">
                <strong>Software INC</strong>
                <span>(testeo)</span>
            </div>
        </div>
        <div class="estado_administrador">
            <span class="label_permisos">Permisos de administrador: </span>
            <div class="indicador_activo">
                <span class="puntero_activo"></span>
                Activo
            </div>
        </div>
        <div class="acciones_de_arriba">
            <button class="boton_nav">←</button>
            <button class="boton_nav">→</button>
            <button class="cerrar_sesion">Cerrar sesión</button>
        </div>
    </header>
    <main class="contenedor_menu">
        <aside class="panel_lateral_menu">
            <h1 class="titulo_menu">Menú principal</h1>
            <hr class="separador_menu">
            <button class="opcion_menu" id="boton_ir_gestion">Gestionar casos de prueba</button>
            <button class="opcion_menu">Generar informes de casos de prueba</button>
            <button class="opcion_menu">Herramientas CI/CD y control de versiones</button>
        </aside>
    </main>
    <footer>
        <div class="logo">
            <img src="../Imagenes/icono-software.png" alt="Logo" class="icono_imagen">
            <div class="texto_logo">
                <p>SOFTWARE INC<br><span>Los mejores softwares</span></p>
            </div>
        </div>
    </footer>
</body>
</html>
