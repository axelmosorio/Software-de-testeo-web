<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="contenedor_principal_login">
        <h1 class="titulo_login">Inicio de sesión</h1>
        <hr class="separador">
        
        <div class="username">
            <input type="text" id="username" name="username" placeholder="Nombre de usuario" required>
        </div>
        <div class="password">
            <input type="password" id="password" name="password" placeholder="Contraseña" required>
        </div>
        
        <button type="submit" class="boton_iniciar" id="boton_login">Iniciar</button>
        <div class="enlaces_secundario registro">
            <p>¿No tienes cuenta? <a href="registro.html" class="enlace_registro">Regístrate aquí</a></p>
            <p>¿Has olvidado tu contraseña? <a href="recuperar_c.html" class="enlace_recuperar">Recupérala aquí</a></p>
        </div>
        
        <footer>
            <a href="#" class="enlace_logo">
                <div class="logo">
                    <img src="icono-software.png" alt="Icono Software Inc" class="icono_imagen">
                    <div class="texto_logo">
                        <p>SOFTWARE INC<br><span>Los mejores softwares</span></p>
                    </div>
                </div>
            </a>
        </footer>
</body>
</html>
