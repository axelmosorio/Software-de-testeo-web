<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuarios</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JavaScript/script.js" defer></script>
</head>
<body>
    <div class="contenedor_principal_registro">
        <h1 class="titulo_registro">Registro de usuarios</h1>
        <hr class="separador">
        <div class="email">
            <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
        </div>
        <div class="username">
            <input type="text" id="username" name="username" placeholder="Nombre de usuario" required>
        </div>
        <div class="password">
            <input type="password" id="password" name="password" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="boton_registrar" id="boton_registro">Registrar cuenta</button>
        <div class="enlaces_secundarios registro">
            <p>¿Ya tienes una cuenta? <a href="../Iniciar sesion y registro/login.html" class="enlace_login">Inicia sesión aquí</a></p>
        </div>
        <footer>
            <a href="#" class="enlace_logo">
                <div class="logo">
                    <img src="../Imagenes/icono-software.png" alt="Icono Software Inc" class="icono_imagen">
                    <div class="texto_logo">
                        <p>SOFTWARE INC<br><span>Los mejores softwares</span></p>
                    </div>
                </div>
            </a>
        </footer>
    </div>
</body>
</html>
