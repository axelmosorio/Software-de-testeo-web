<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JavaScript/script.js" defer></script>
</head>
<body class="body_recuperar">
    <main class="contenedor_recuperar">
        <h2 class="titulo_recuperar">Recuperar contraseña</h2>
        <hr class="separador">
        <div class="contenido_izquierda">
            <label class="label_recuperar">Escribe tu correo electrónico y te enviaremos un link para restablecer tu contraseña</label>
            <input type="email" id="email_recuperar" placeholder="correo@ejemplo.com" required>
            <button type="submit" id="btn_recuperar" class="boton_iniciar">Enviar enlace</button>
            <p class="texto_footer_recuperar">
                ¿Ya tienes tu contraseña? <a href="../Iniciar sesion y registro/login.html" class="enlace_login">Inicia sesión aquí</a>
            </p>
        </div>
    </main>
    <footer>
            <a href="#" class="enlace_logo">
                <div class="logo">
                    <img src="../Imagenes/icono-software.png" alt="Icono Software Inc" class="icono_imagen">
                    <div class="texto_logo">
                        <p>SOFTWARE INC<br><span>Los mejores softwares</span></p>
                    </div>
                </div>
            </a>
        </footer>
</body>
</html>
